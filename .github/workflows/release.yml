name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        required: false
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.notes.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          manual_tag="${{ inputs.tag }}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          elif [ -n "$manual_tag" ]; then
            tag="$manual_tag"
          else
            version="$(grep -m1 '"version"' package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')"
            tag="v$version"
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

          target_ref="$GITHUB_SHA"
          if git rev-parse -q --verify "refs/tags/${tag}^{commit}" >/dev/null; then
            target_ref="$tag"
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${target_ref}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${target_ref}"
          else
            range="$target_ref"
          fi

          git log "$range" \
            --pretty=format:"- %s ([%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H))" \
            > release-notes.md

          if [ ! -s release-notes.md ]; then
            subject="$(git log -1 --pretty=%s "$target_ref")"
            short_sha="$(git rev-parse --short "$target_ref")"
            sha="$(git rev-parse "$target_ref")"
            echo "- ${subject} ([${short_sha}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${sha}))" > release-notes.md
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 7

  windows:
    name: Package Windows x64
    runs-on: windows-2025
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-x64-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            windows-x64-cargo-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compile Windows app
        run: npm run tauri -- build --no-bundle

      - name: Create release zip
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Force -Path artifact\wuhu | Out-Null
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item src-tauri\target\release\wuhu.exe artifact\wuhu\wuhu.exe -Force
          Compress-Archive -Path artifact\* -DestinationPath "release\wuhu-$env:RELEASE_TAG-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: wuhu-windows-x64
          path: release/wuhu-*-windows-x64.zip
          retention-days: 7

  macos-arm64:
    name: Package macOS arm64
    runs-on: macos-26
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-arm64-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            macos-arm64-cargo-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compile macOS arm64 app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri -- build --target aarch64-apple-darwin --bundles app --ci

      - name: Create release zip
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          app_path="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/wuhu.app"
          if [ ! -d "$app_path" ]; then
            app_path="src-tauri/target/release/bundle/macos/wuhu.app"
          fi
          if [ ! -d "$app_path" ]; then
            echo "wuhu.app not found" >&2
            find src-tauri/target -maxdepth 6 -name "wuhu.app" -print >&2
            exit 1
          fi

          icon_file="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' "$app_path/Contents/Info.plist")"
          if [ "$icon_file" != "icon.icns" ]; then
            echo "Unexpected CFBundleIconFile: $icon_file" >&2
            exit 1
          fi
          if [ ! -f "$app_path/Contents/Resources/icon.icns" ]; then
            echo "icon.icns not found in app bundle" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"

          mkdir -p release
          zip_path="$PWD/release/wuhu-${RELEASE_TAG}-macos-arm64.zip"
          (
            cd "$(dirname "$app_path")"
            zip -qry -X --symlinks "$zip_path" "$(basename "$app_path")"
          )

          zip_list="$(unzip -l "release/wuhu-${RELEASE_TAG}-macos-arm64.zip")"
          for forbidden_entry in "__MACOSX/" "/._" "._wuhu" "._Info.plist"; do
            if [[ "$zip_list" == *"$forbidden_entry"* ]]; then
              echo "Unexpected metadata entry: $forbidden_entry" >&2
              exit 1
            fi
          done
          for required_entry in \
            "wuhu.app/Contents/MacOS/wuhu" \
            "wuhu.app/Contents/Resources/icon.icns" \
            "wuhu.app/Contents/_CodeSignature/CodeResources"
          do
            if [[ "$zip_list" != *"$required_entry"* ]]; then
              echo "Missing zip entry: $required_entry" >&2
              exit 1
            fi
          done

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: wuhu-macos-arm64
          path: release/wuhu-*-macos-arm64.zip
          retention-days: 7

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare
      - windows
      - macos-arm64

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v7
        with:
          name: release-notes
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: wuhu-windows-x64
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: wuhu-macos-arm64
          path: release

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          files=(
            "release/wuhu-${RELEASE_TAG}-windows-x64.zip"
            "release/wuhu-${RELEASE_TAG}-macos-arm64.zip"
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            gh release edit "$RELEASE_TAG" --notes-file release/release-notes.md
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --notes-file release/release-notes.md
          fi
