name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Package Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compile Windows app
        run: npm run tauri -- build --no-bundle

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact\wuhu | Out-Null
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item src-tauri\target\release\wuhu.exe artifact\wuhu\wuhu.exe -Force
          Compress-Archive -Path artifact\* -DestinationPath release\wuhu.zip -Force

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          manual_tag="${{ inputs.tag }}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          elif [ -n "$manual_tag" ]; then
            tag="$manual_tag"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v$version"
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

          target_ref="$GITHUB_SHA"
          if git rev-parse -q --verify "refs/tags/${tag}^{commit}" >/dev/null; then
            target_ref="$tag"
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${target_ref}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${target_ref}"
          else
            range="$target_ref"
          fi

          git log "$range" \
            --pretty=format:"- %s ([%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H))" \
            > release-notes.md

          if [ ! -s release-notes.md ]; then
            subject="$(git log -1 --pretty=%s "$target_ref")"
            short_sha="$(git rev-parse --short "$target_ref")"
            sha="$(git rev-parse "$target_ref")"
            echo "- ${subject} ([${short_sha}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${sha}))" > release-notes.md
          fi

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          if (gh release view $tag 2>$null) {
            gh release upload $tag release\wuhu.zip --clobber
            gh release edit $tag --notes-file release-notes.md
          } else {
            gh release create $tag release\wuhu.zip --target $env:GITHUB_SHA --title $tag --notes-file release-notes.md
          }
